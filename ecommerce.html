<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>E-Commerce ES1999</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background-color:#f0f0f0;
        }

        header{
            background-color:#222;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            margin-top:10px;
        }

        nav button{
            padding:10px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #prodotti{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            background-color:white;
            width:250px;
            border-radius:10px;
            overflow:hidden;
            text-align:center;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:200px;
            object-fit:cover;
        }

        .card h3{
            margin:10px;
        }

        .card p{
            padding:5px;
        }

        .card button{
            margin-bottom:15px;
            padding:10px;
            background-color:green;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        #dettagli{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        #dettagli img{
            width:100%;
            border-radius:10px;
        }

        #carrello{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        #configurazione{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
            text-align:center;
        }

        textarea{
            width:100%;
            height:200px;
        }

        @media(max-width:600px){

            #prodotti{
                flex-direction:column;
                align-items:center;
            }

            .card{
                width:90%;
            }

        }

    </style>

</head>

<body>

<header>

    <h1>Tech Store</h1>

    <nav>

        <button onclick="mostraHome()">
            Home
        </button>

        <button onclick="mostraCarrello()">
            Carrello
        </button>

        <button onclick="mostraConfigurazione()">
            Configurazione
        </button>

    </nav>

</header>

<div id="prodotti"></div>

<div id="dettagli"></div>

<div id="carrello"></div>

<div id="configurazione">

    <h2>Configurazione CSV</h2>

    <p>
        Inserisci:
        marca,modello,descrizione,immagine,prezzo
    </p>

<textarea id="csv">

Logitech,G203,Mouse gaming RGB,https://picsum.photos/300?1,29.99
Razer,BlackWidow,Tastiera meccanica RGB,https://picsum.photos/300?2,89.99
HyperX,Cloud II,Cuffie gaming surround,https://picsum.photos/300?3,69.99

</textarea>

    <br><br>

    <button onclick="caricaCSV()">
        Carica prodotti
    </button>

</div>

<script>

var prodotti = [];

var carrello = [];

function caricaCSV(){

    prodotti = [];

    var testo = document.getElementById("csv").value;

    var righe = testo.split("\n");

    for(var i = 0; i < righe.length; i++){

        var colonne = righe[i].split(",");

        if(colonne.length >= 5){

            var prodotto = {

                marca: colonne[0],
                modello: colonne[1],
                descrizione: colonne[2],
                immagine: colonne[3],
                prezzo: colonne[4]

            };

            prodotti.push(prodotto);

        }

    }

    mostraProdotti();

}

function mostraProdotti(){

    document.getElementById("prodotti").style.display = "flex";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("configurazione").style.display = "none";

    var contenitore = document.getElementById("prodotti");

    contenitore.innerHTML = "";

    for(var i = 0; i < prodotti.length; i++){

        contenitore.innerHTML +=

        '<div class="card">' +

            '<img src="' + prodotti[i].immagine + '">' +

            '<h3>' +
                prodotti[i].marca +
                ' ' +
                prodotti[i].modello +
            '</h3>' +

            '<p>' +
                prodotti[i].prezzo +
                ' €' +
            '</p>' +

            '<button onclick="vediDettagli(' + i + ')">' +
                'Dettagli' +
            '</button>' +

        '</div>';

    }

}

function vediDettagli(index){

    document.getElementById("prodotti").style.display = "none";

    var dettagli = document.getElementById("dettagli");

    dettagli.style.display = "block";

    dettagli.innerHTML =

        '<img src="' + prodotti[index].immagine + '">' +

        '<h2>' +
            prodotti[index].marca +
            ' ' +
            prodotti[index].modello +
        '</h2>' +

        '<p>' +
            prodotti[index].descrizione +
        '</p>' +

        '<h3>' +
            prodotti[index].prezzo +
            ' €' +
        '</h3>' +

        '<button onclick="aggiungiCarrello(' + index + ')">' +
            'Aggiungi al carrello' +
        '</button>';

}

function aggiungiCarrello(index){

    carrello.push(prodotti[index]);

    alert("Prodotto aggiunto al carrello");

}

function mostraCarrello(){

    document.getElementById("prodotti").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("configurazione").style.display = "none";

    var divCarrello = document.getElementById("carrello");

    divCarrello.style.display = "block";

    var totale = 0;

    divCarrello.innerHTML = "<h2>Carrello</h2>";

    for(var i = 0; i < carrello.length; i++){

        totale += parseFloat(carrello[i].prezzo);

        divCarrello.innerHTML +=

        '<p>' +

            carrello[i].marca +
            ' ' +
            carrello[i].modello +

            ' - ' +

            carrello[i].prezzo +
            ' €' +

        '</p>';

    }

    divCarrello.innerHTML +=

    '<h3>' +
        'Totale: ' +
        totale.toFixed(2) +
        ' €' +
    '</h3>' +

    '<button onclick="window.print()">' +
        'Stampa PDF' +
    '</button>';

}

function mostraConfigurazione(){

    document.getElementById("prodotti").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";

    document.getElementById("configurazione").style.display = "block";

}

function mostraHome(){

    mostraProdotti();

}

caricaCSV();

</script>

</body>
</html>
