<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>InterFans</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Poppins', sans-serif;
    background:linear-gradient(to bottom,#02142b,#003c8f);
    min-height:100vh;
}

header{
    background:linear-gradient(to right,#000000,#0057d9);
    color:white;
    padding:20px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.4);
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

.logo{
    font-size:35px;
    font-weight:bold;
}

nav{
    display:flex;
    gap:10px;
}

nav button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background-color:white;
    color:#0047ab;
    font-weight:bold;
    transition:0.3s;
}

nav button:hover{
    background-color:#99c2ff;
    transform:scale(1.05);
}

#home{
    padding:40px;
}

.titolo-home{
    text-align:center;
    color:white;
    margin-bottom:40px;
    font-size:40px;
}

.box-home{
    background-color:white;
    max-width:700px;
    margin:auto;
    padding:30px;
    border-radius:20px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

.box-home h2{
    color:#0047ab;
}

select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid gray;
    font-family:'Poppins', sans-serif;
}

.drag-area{
    border:3px dashed #0047ab;
    padding:40px;
    text-align:center;
    margin-top:30px;
    border-radius:10px;
    background-color:#f7faff;
}

.drag-area input{
    margin-top:15px;
}

.drag-area button{
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:linear-gradient(to right,#003c8f,#007bff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

#paginaCategoria{
    display:none;
    padding:30px;
}

.titolo-categoria{
    text-align:center;
    color:white;
    font-size:35px;
}

#contenutoCategoria{
    max-width:1100px;
    margin:auto;
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background-color:white;
    width:250px;
    border-radius:15px;
    overflow:hidden;
    text-align:center;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    color:#0047ab;
    padding:5px;
}

.card p{
    padding:10px;
}

.card button{
    margin-bottom:15px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:linear-gradient(to right,#003c8f,#007bff);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

#carrello{
    display:none;
    max-width:700px;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

#contatti{
    display:none;
    max-width:700px;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.3);
}

.contatto-box{
    background-color:#f5f5f5;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
}

.contatto-box h3{
    color:#0047ab;
}

@media(max-width:600px){

    .topbar{
        flex-direction:column;
        gap:15px;
    }

    .box-home{
        width:90%;
    }

    .card{
        width:90%;
    }

}

</style>

</head>

<body>

<header>

<div class="topbar">

    <div class="logo">
        InterFans
    </div>

    <nav>

        <button onclick="mostraHome()">
            Home
        </button>

        <button onclick="mostraCarrello()">
            Carrello
        </button>

        <button onclick="mostraContatti()">
            Contattaci
        </button>

    </nav>

</div>

</header>

<div id="home">

    <h1 class="titolo-home">
        Benvenuto su InterFans
    </h1>

    <div class="box-home">

        <h2>Seleziona categoria CSV</h2>

        <select id="categoriaCSV" onchange="cambiaCategoria()">

            <option value="">
                -- Seleziona categoria --
            </option>

            <option value="Maglie Firmate">
                Maglie Firmate
            </option>

            <option value="Palloni Firmati">
                Palloni Firmati
            </option>

            <option value="Maglie Originali">
                Maglie Originali
            </option>

        </select>

        <div class="drag-area">

            <h3>
                Carica il tuo file CSV
            </h3>

            <p>
                Trascina il file oppure selezionalo
            </p>

            <input type="file" id="csvFile" accept=".csv">

            <br><br>

            <button onclick="caricaCSV()">
                Carica CSV
            </button>

        </div>

    </div>

</div>

<div id="paginaCategoria">

    <h1 class="titolo-categoria" id="titoloCategoria"></h1>

    <div id="contenutoCategoria"></div>

</div>

<div id="carrello"></div>

<div id="contatti">

    <h2>Contattaci</h2>

    <p>
        Per informazioni sugli ordini o sui prodotti firmati.
    </p>

    <div class="contatto-box">

        <h3>Email</h3>

        <p>
            interfansshop@gmail.com
        </p>

    </div>

    <div class="contatto-box">

        <h3>Telefono</h3>

        <p>
            +39 02 12345678
        </p>

    </div>

    <div class="contatto-box">

        <h3>Sede</h3>

        <p>
            Milano - Zona San Siro
        </p>

    </div>

</div>

<script>

var carrello = [];

var categoriaAttiva = "";

function cambiaCategoria(){

    categoriaAttiva =
    document.getElementById("categoriaCSV").value;

}

function caricaCSV(){

    var file =
    document.getElementById("csvFile").files[0];

    if(!file){

        alert("Seleziona un file CSV");
        return;

    }

    if(categoriaAttiva == ""){

        alert("Seleziona una categoria");
        return;

    }

    var reader = new FileReader();

    reader.onload = function(evento){

        var testo = evento.target.result;

        apriCategoria(categoriaAttiva, testo);

    };

    reader.readAsText(file);

}

function apriCategoria(nomeCategoria, testoCSV){

    document.getElementById("home").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    document.getElementById("paginaCategoria").style.display = "block";

    document.getElementById("titoloCategoria").innerHTML =
    nomeCategoria;

    var contenitore =
    document.getElementById("contenutoCategoria");

    contenitore.innerHTML = "";

    var righe = testoCSV.split("\n");

    for(var i = 0; i < righe.length; i++){

        var colonne = righe[i].split(",");

        if(colonne.length >= 5){

            contenitore.innerHTML +=

            '<div class="card">' +

                '<img src="' + colonne[3] + '">' +

                '<h3>' +
                    colonne[0] +
                    ' ' +
                    colonne[1] +
                '</h3>' +

                '<p>' +
                    colonne[2] +
                '</p>' +

                '<h3>' +
                    colonne[4] +
                    ' €' +
                '</h3>' +

                '<button onclick="aggiungiCarrello(`' +
                    colonne[0] + ' ' + colonne[1] +
                    '`,`' +
                    colonne[4] +
                '`)">' +

                    'Aggiungi al carrello' +

                '</button>' +

            '</div>';

        }

    }

}

function aggiungiCarrello(nome, prezzo){

    var prodotto = {

        nome: nome,
        prezzo: Number(prezzo)

    };

    carrello.push(prodotto);

    alert("Prodotto aggiunto al carrello");

}

function mostraCarrello(){

    document.getElementById("home").style.display = "none";
    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    var divCarrello =
    document.getElementById("carrello");

    divCarrello.style.display = "block";

    var totale = 0;

    divCarrello.innerHTML = "<h2>Carrello</h2>";

    for(var i = 0; i < carrello.length; i++){

        totale = totale + carrello[i].prezzo;

        divCarrello.innerHTML +=

        '<p>' +

            carrello[i].nome +

            ' - ' +

            carrello[i].prezzo +
            ' €' +

        '</p>';

    }

    divCarrello.innerHTML +=

    '<h3>' +
        'Totale: ' +
        totale +
        ' €' +
    '</h3><br>' +

    '<button onclick="window.print()">' +
        'Stampa PDF' +
    '</button>';

}

function mostraContatti(){

    document.getElementById("home").style.display = "none";
    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("carrello").style.display = "none";

    document.getElementById("contatti").style.display = "block";

}

function mostraHome(){

    document.getElementById("home").style.display = "block";

    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("contatti").style.display = "none";

}

</script>

</body>

</html>
