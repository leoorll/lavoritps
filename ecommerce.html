<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InterFans</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background-color:#e9eef5;
        }

        header{
            background:linear-gradient(to right,#000000,#0047ab);
            color:white;
            padding:20px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .logo{
            font-size:32px;
            font-weight:bold;
        }

        nav{
            display:flex;
            gap:10px;
        }

        nav button{
            padding:10px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background-color:white;
            color:#0047ab;
            font-weight:bold;
        }

        nav button:hover{
            background-color:#dbe7ff;
        }

        #home{
            padding:40px;
        }

        .titolo-home{
            text-align:center;
            color:#0047ab;
            margin-bottom:40px;
        }

        .categorie{
            display:flex;
            justify-content:center;
            gap:30px;
            flex-wrap:wrap;
        }

        .categoria{
            width:280px;
            height:200px;
            background-color:white;
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
            display:flex;
            align-items:center;
            justify-content:center;
            text-align:center;
            font-size:24px;
            font-weight:bold;
            color:#0047ab;
            cursor:pointer;
            transition:0.3s;
        }

        .categoria:hover{
            transform:scale(1.05);
            background-color:#dbe7ff;
        }

        #paginaCategoria{
            display:none;
            padding:30px;
        }

        .titolo-categoria{
            text-align:center;
            color:#0047ab;
            margin-bottom:30px;
        }

        #contenutoCategoria{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
        }

        #carrello{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        #contatti{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        .contatto-box{
            background-color:#f5f5f5;
            padding:15px;
            border-radius:10px;
            margin-top:15px;
        }

        .contatto-box h3{
            color:#0047ab;
        }

        @media(max-width:600px){

            .topbar{
                flex-direction:column;
                gap:15px;
            }

            .categoria{
                width:90%;
            }

        }

    </style>

</head>

<body>

<header>

    <div class="topbar">

        <div class="logo">
            InterFans
        </div>

        <nav>

            <button onclick="mostraHome()">
                Home
            </button>

            <button onclick="mostraCarrello()">
                Carrello
            </button>

            <button onclick="mostraContatti()">
                Contattaci
            </button>

        </nav>

    </div>

</header>

<div id="home">

    <h1 class="titolo-home">
        Benvenuto su InterFans
    </h1>

    <div class="categorie">

        <div class="categoria" onclick="apriCategoria('Maglie Firmate')">

            Maglie Firmate

        </div>

        <div class="categoria" onclick="apriCategoria('Palloni Firmati')">

            Palloni Firmati

        </div>

        <div class="categoria" onclick="apriCategoria('Maglie Originali')">

            Maglie Originali

        </div>

    </div>

</div>

<div id="paginaCategoria">

    <h1 class="titolo-categoria" id="titoloCategoria"></h1>

    <div id="contenutoCategoria"></div>

</div>

<div id="carrello"></div>

<div id="contatti">

    <h2>Contattaci</h2>

    <p>
        Hai bisogno di informazioni sui prodotti oppure sugli ordini?
    </p>

    <div class="contatto-box">

        <h3>Email</h3>

        <p>
            interfansshop@gmail.com
        </p>

    </div>

    <div class="contatto-box">

        <h3>Telefono</h3>

        <p>
            +39 02 12345678
        </p>

    </div>

    <div class="contatto-box">

        <h3>Sede</h3>

        <p>
            Milano - Zona San Siro
        </p>

    </div>

</div>

<script>

var carrello = [];

function apriCategoria(nomeCategoria){

    document.getElementById("home").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    document.getElementById("paginaCategoria").style.display = "block";

    document.getElementById("titoloCategoria").innerHTML = nomeCategoria;

    document.getElementById("contenutoCategoria").innerHTML =

    '<h3>' +
    'Pagina dedicata a: ' + nomeCategoria +
    '</h3>' +

    '<p>' +
    'Qui verranno mostrati i prodotti della categoria.' +
    '</p>';

}

function mostraCarrello(){

    document.getElementById("home").style.display = "none";
    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    var divCarrello = document.getElementById("carrello");

    divCarrello.style.display = "block";

    var totale = 0;

    divCarrello.innerHTML = "<h2>Carrello</h2>";

    for(var i = 0; i < carrello.length; i++){

        totale += parseFloat(carrello[i].prezzo);

        divCarrello.innerHTML +=

        '<p>' +

            carrello[i].nome +

            ' - ' +

            carrello[i].prezzo +
            ' €' +

        '</p>';

    }

    divCarrello.innerHTML +=

    '<h3>' +
        'Totale: ' +
        totale.toFixed(2) +
        ' €' +
    '</h3>' +

    '<button onclick="window.print()">' +
        'Stampa PDF' +
    '</button>';

}

function mostraContatti(){

    document.getElementById("home").style.display = "none";
    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("carrello").style.display = "none";

    document.getElementById("contatti").style.display = "block";

}

function mostraHome(){

    document.getElementById("home").style.display = "block";

    document.getElementById("paginaCategoria").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("contatti").style.display = "none";

}

</script>

</body>

</html>
