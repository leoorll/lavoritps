<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Commerce CSV</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background-color:#f2f2f2;
}

header{
    background-color:#222;
    color:white;
    padding:20px;
    text-align:center;
}

nav{
    margin-top:10px;
}

nav button{
    margin:5px;
    padding:10px;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

#contenitore{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background-color:white;
    width:250px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0px 0px 10px rgba(0,0,0,0.2);
    text-align:center;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:10px;
}

.card p{
    padding:5px;
}

.card button{
    margin-bottom:15px;
    padding:10px;
    border:none;
    background-color:#28a745;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

#dettagli{
    max-width:700px;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    display:none;
}

#dettagli img{
    width:100%;
    border-radius:10px;
}

#carrello{
    max-width:700px;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    display:none;
}

#configurazione{
    max-width:600px;
    margin:auto;
    background-color:white;
    padding:20px;
    border-radius:10px;
    margin-top:20px;
    text-align:center;
    display:none;
}

textarea{
    width:100%;
    height:200px;
}

#totale{
    text-align:center;
}

@media(max-width:600px){

    #contenitore{
        flex-direction:column;
        align-items:center;
    }

    .card{
        width:90%;
    }

}

</style>

</head>
<body>

<header>

    <h1>Tech Store</h1>

    <nav>

        <button onclick="mostraHome()">
            Home
        </button>

        <button onclick="mostraCarrello()">
            Carrello
        </button>

        <button onclick="mostraConfigurazione()">
            Configurazione CSV
        </button>

    </nav>

</header>

<div id="contenitore"></div>

<div id="dettagli"></div>

<div id="carrello"></div>

<div id="configurazione">

    <h2>Inserisci CSV</h2>

    <p>
        Formato:
        marca,modello,descrizione,immagine,prezzo
    </p>

<textarea id="csvInput">

Logitech,G203,Mouse gaming RGB,https://picsum.photos/300?1,29.99
Razer,BlackWidow,Tastiera meccanica RGB,https://picsum.photos/300?2,89.99
HyperX,Cloud II,Cuffie gaming surround,https://picsum.photos/300?3,69.99

</textarea>

    <br><br>

    <button onclick="caricaCSV()">
        Carica Prodotti
    </button>

</div>

<script>

let prodotti = [];

let carrello = [];

function caricaCSV(){

    prodotti = [];

    let testo = document.getElementById("csvInput").value;

    let righe = testo.trim().split("\n");

    righe.forEach(riga => {

        let colonne = riga.split(",");

        if(colonne.length >= 5){

            let prodotto = {

                marca: colonne[0],
                modello: colonne[1],
                descrizione: colonne[2],
                immagine: colonne[3],
                prezzo: colonne[4]

            };

            prodotti.push(prodotto);

        }

    });

    mostraProdotti();

    alert("Prodotti caricati");

}

function mostraProdotti(){

    document.getElementById("contenitore").style.display = "flex";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("configurazione").style.display = "none";

    let contenitore = document.getElementById("contenitore");

    contenitore.innerHTML = "";

    prodotti.forEach((prodotto, index) => {

        contenitore.innerHTML += `

        <div class="card">

            <img src="${prodotto.immagine}">

            <h3>
                ${prodotto.marca} ${prodotto.modello}
            </h3>

            <p>
                ${prodotto.prezzo} €
            </p>

            <button onclick="vediDettagli(${index})">
                Dettagli
            </button>

        </div>

        `;

    });

}

function vediDettagli(index){

    document.getElementById("contenitore").style.display = "none";
    document.getElementById("dettagli").style.display = "block";

    let prodotto = prodotti[index];

    let dettagli = document.getElementById("dettagli");

    dettagli.innerHTML = `

        <img src="${prodotto.immagine}">

        <h2>
            ${prodotto.marca} ${prodotto.modello}
        </h2>

        <p>
            ${prodotto.descrizione}
        </p>

        <h3>
            ${prodotto.prezzo} €
        </h3>

        <button onclick="aggiungiCarrello(${index})">
            Aggiungi al carrello
        </button>

    `;

}

function aggiungiCarrello(index){

    carrello.push(prodotti[index]);

    alert("Prodotto aggiunto al carrello");

}

function mostraCarrello(){

    document.getElementById("contenitore").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("configurazione").style.display = "none";

    let divCarrello = document.getElementById("carrello");

    divCarrello.style.display = "block";

    let totale = 0;

    divCarrello.innerHTML = "<h2>Carrello</h2>";

    carrello.forEach(prodotto => {

        totale += parseFloat(prodotto.prezzo);

        divCarrello.innerHTML += `

        <p>

            ${prodotto.marca}
            ${prodotto.modello}

            - ${prodotto.prezzo} €

        </p>

        `;

    });

    divCarrello.innerHTML += `

        <h3 id="totale">
            Totale: ${totale.toFixed(2)} €
        </h3>

        <button onclick="window.print()">
            Stampa PDF
        </button>

    `;

}

function mostraConfigurazione(){

    document.getElementById("contenitore").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";

    document.getElementById("configurazione").style.display = "block";

}

function mostraHome(){

    mostraProdotti();

}

caricaCSV();

</script>

</body>
</html>
