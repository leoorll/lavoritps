<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>InterFans</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background-color:#e9eef5;
        }

        header{
            background:linear-gradient(to right,#000000,#0047ab);
            color:white;
            padding:20px;
        }

        .topbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .logo{
            font-size:32px;
            font-weight:bold;
        }

        nav{
            display:flex;
            gap:10px;
        }

        nav button{
            padding:10px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            background-color:white;
            color:#0047ab;
            font-weight:bold;
        }

        nav button:hover{
            background-color:#dbe7ff;
        }

        #prodotti{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            padding:20px;
        }

        .card{
            background-color:white;
            width:260px;
            border-radius:10px;
            overflow:hidden;
            text-align:center;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card h3{
            margin:10px;
            color:#0047ab;
        }

        .card p{
            padding:5px;
        }

        .card button{
            margin-bottom:15px;
            padding:10px;
            background-color:#0047ab;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .card button:hover{
            background-color:#002f73;
        }

        #dettagli{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        #dettagli img{
            width:100%;
            border-radius:10px;
        }

        #carrello{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        #configurazione{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
            text-align:center;
        }

        #contatti{
            display:none;
            max-width:700px;
            margin:auto;
            background-color:white;
            padding:20px;
            border-radius:10px;
            margin-top:20px;
        }

        textarea{
            width:100%;
            height:200px;
        }

        .contatto-box{
            background-color:#f5f5f5;
            padding:15px;
            border-radius:10px;
            margin-top:15px;
        }

        .contatto-box h3{
            color:#0047ab;
        }

        @media(max-width:600px){

            .topbar{
                flex-direction:column;
                gap:15px;
            }

            #prodotti{
                flex-direction:column;
                align-items:center;
            }

            .card{
                width:90%;
            }

        }

    </style>

</head>

<body>

<header>

    <div class="topbar">

        <div class="logo">
            InterFans
        </div>

        <nav>

            <button onclick="mostraHome()">
                Home
            </button>

            <button onclick="mostraCarrello()">
                Carrello
            </button>

            <button onclick="mostraContatti()">
                Contattaci
            </button>

            <button onclick="mostraConfigurazione()">
                Configurazione
            </button>

        </nav>

    </div>

</header>

<div id="prodotti"></div>

<div id="dettagli"></div>

<div id="carrello"></div>

<div id="configurazione">

    <h2>Configurazione CSV</h2>

    <p>
        Inserisci:
        marca,modello,descrizione,immagine,prezzo
    </p>

<textarea id="csv">

Inter,Lautaro Martinez 10,Maglia ufficiale autografata,https://picsum.photos/300?1,249.99
Nike,Pallone Champions League,Pallone firmato dai giocatori,https://picsum.photos/300?2,179.99
Inter,Barella 23,Maglia away autografata,https://picsum.photos/300?3,229.99

</textarea>

    <br><br>

    <button onclick="caricaCSV()">
        Carica prodotti
    </button>

</div>

<div id="contatti">

    <h2>Contattaci</h2>

    <p>
        Hai problemi con un ordine oppure vuoi maggiori informazioni
        sui prodotti firmati?
    </p>

    <div class="contatto-box">

        <h3>Email</h3>

        <p>
            interfansshop@gmail.com
        </p>

    </div>

    <div class="contatto-box">

        <h3>Telefono</h3>

        <p>
            +39 02 12345678
        </p>

    </div>

    <div class="contatto-box">

        <h3>Sede</h3>

        <p>
            Milano - Zona San Siro
        </p>

    </div>

</div>

<script>

var prodotti = [];

var carrello = [];

function caricaCSV(){

    prodotti = [];

    var testo = document.getElementById("csv").value;

    var righe = testo.split("\n");

    for(var i = 0; i < righe.length; i++){

        var colonne = righe[i].split(",");

        if(colonne.length >= 5){

            var prodotto = {

                marca: colonne[0],
                modello: colonne[1],
                descrizione: colonne[2],
                immagine: colonne[3],
                prezzo: colonne[4]

            };

            prodotti.push(prodotto);

        }

    }

    mostraProdotti();

}

function mostraProdotti(){

    document.getElementById("prodotti").style.display = "flex";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("configurazione").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    var contenitore = document.getElementById("prodotti");

    contenitore.innerHTML = "";

    for(var i = 0; i < prodotti.length; i++){

        contenitore.innerHTML +=

        '<div class="card">' +

            '<img src="' + prodotti[i].immagine + '">' +

            '<h3>' +
                prodotti[i].marca +
                ' ' +
                prodotti[i].modello +
            '</h3>' +

            '<p>' +
                prodotti[i].prezzo +
                ' €' +
            '</p>' +

            '<button onclick="vediDettagli(' + i + ')">' +
                'Dettagli' +
            '</button>' +

        '</div>';

    }

}

function vediDettagli(index){

    document.getElementById("prodotti").style.display = "none";

    var dettagli = document.getElementById("dettagli");

    dettagli.style.display = "block";

    dettagli.innerHTML =

        '<img src="' + prodotti[index].immagine + '">' +

        '<h2>' +
            prodotti[index].marca +
            ' ' +
            prodotti[index].modello +
        '</h2>' +

        '<p>' +
            prodotti[index].descrizione +
        '</p>' +

        '<h3>' +
            prodotti[index].prezzo +
            ' €' +
        '</h3>' +

        '<button onclick="aggiungiCarrello(' + index + ')">' +
            'Aggiungi al carrello' +
        '</button>';

}

function aggiungiCarrello(index){

    carrello.push(prodotti[index]);

    alert("Prodotto aggiunto al carrello");

}

function mostraCarrello(){

    document.getElementById("prodotti").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("configurazione").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    var divCarrello = document.getElementById("carrello");

    divCarrello.style.display = "block";

    var totale = 0;

    divCarrello.innerHTML = "<h2>Carrello</h2>";

    for(var i = 0; i < carrello.length; i++){

        totale += parseFloat(carrello[i].prezzo);

        divCarrello.innerHTML +=

        '<p>' +

            carrello[i].marca +
            ' ' +
            carrello[i].modello +

            ' - ' +

            carrello[i].prezzo +
            ' €' +

        '</p>';

    }

    divCarrello.innerHTML +=

    '<h3>' +
        'Totale: ' +
        totale.toFixed(2) +
        ' €' +
    '</h3>' +

    '<button onclick="window.print()">' +
        'Stampa PDF' +
    '</button>';

}

function mostraConfigurazione(){

    document.getElementById("prodotti").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("contatti").style.display = "none";

    document.getElementById("configurazione").style.display = "block";

}

function mostraContatti(){

    document.getElementById("prodotti").style.display = "none";
    document.getElementById("dettagli").style.display = "none";
    document.getElementById("carrello").style.display = "none";
    document.getElementById("configurazione").style.display = "none";

    document.getElementById("contatti").style.display = "block";

}

function mostraHome(){

    mostraProdotti();

}

caricaCSV();

</script>

</body>

</html>
